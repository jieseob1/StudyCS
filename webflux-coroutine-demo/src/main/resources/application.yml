server:
  port: 8080

spring:
  application:
    name: webflux-coroutine-demo
  main:
    web-application-type: reactive
  datasource:
    url: jdbc:h2:mem:webfluxdemo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  r2dbc:
    url: r2dbc:h2:mem:///webfluxdemo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:

logging:
  level:
    root: INFO
    com.studycs.webfluxdemo: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] [requestId=%X{requestId:-none}] %logger{36} - %msg%n"
