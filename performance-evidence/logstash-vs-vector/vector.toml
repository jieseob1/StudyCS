# Vector 파이프라인 설정 (Rust 기반 로그 수집기)
# Tmax 인수인계 문서 기반 프로덕션 설정 재현
#
# Logstash 대비 주요 차이점:
#   - Rust로 작성되어 메모리 안전성 보장 + 낮은 메모리 사용량
#   - JVM 없이 네이티브 바이너리로 실행
#   - 동일 처리량에서 약 60-70% 낮은 메모리 사용 (측정값은 measure.sh 참고)
#
# 처리 흐름: file source → multiline → remap → console + http sink

# ============================================================
# 전역 설정
# ============================================================
[api]
enabled = true
address = "0.0.0.0:8686"

[log_schema]
host_key = "host"
message_key = "message"
timestamp_key = "timestamp"

# ============================================================
# Source: 파일 읽기
# ============================================================
[sources.java_logs]
type = "file"
# /logs/ 디렉토리의 모든 .log 파일 읽기
include = ["/logs/*.log"]
# 파일 시작부터 읽기 (테스트 목적)
read_from = "beginning"
# 멀티라인 설정: Java 스택트레이스 처리
# mode = "halt_before": 새 타임스탬프가 나올 때까지 이전 이벤트에 합침
[sources.java_logs.multiline]
  # 타임스탬프로 시작하는 줄을 새 이벤트 시작으로 감지
  # 예: 2024-01-15 10:30:00.123 INFO ...
  start_pattern = "^\\d{4}-\\d{2}-\\d{2}"
  mode = "halt_before"
  # 10초 내 새 패턴이 없으면 현재 이벤트 강제 완료
  timeout_ms = 10000
  # 최대 이벤트 크기 (스택트레이스가 길 수 있음)
  condition_pattern = "^\\d{4}-\\d{2}-\\d{2}"

# ============================================================
# Transform 1: Grok 파싱 + 필드 추가
# ============================================================
[transforms.parse_logs]
type = "remap"
inputs = ["java_logs"]
# VRL (Vector Remap Language)로 로그 파싱
source = '''
# 1. Grok 패턴으로 파싱
# 포맷: 2024-01-15 10:30:00.123 INFO  [com.example.Class] 메시지
parsed, err = parse_grok(.message, "%{TIMESTAMP_ISO8601:ts} %{LOGLEVEL:level}\\s+\\[%{DATA:logger}\\] %{GREEDYDATA:log_message}")

if err == null {
  .timestamp_str = parsed.ts
  .level = upcase(string!(parsed.level))
  .logger = parsed.logger
  .log_message = parsed.log_message
} else {
  # 파싱 실패 시 원본 메시지 유지
  .parse_error = true
  .log_message = .message
  .level = "UNKNOWN"
}

# 2. 프로젝트 구분 (Tmax 인수인계 문서 기반)
source_file = string!(.file)

if contains(source_file, "superoffice") {
  .project = "superoffice"
  .project_type = "groupware"
} else if contains(source_file, "webtob") {
  .project = "webtob"
  .project_type = "webserver"
} else if contains(source_file, "jeus") {
  .project = "jeus"
  .project_type = "appserver"
} else {
  .project = "general"
  .project_type = "unknown"
}

# 3. 스택트레이스 감지
if exists(.log_message) {
  msg = string!(.log_message)
  if match(msg, r'Exception|Error|at\s+\w+\.\w+') {
    .has_stacktrace = true
    .tags = push(array(.tags) ?? [], "exception")
  }
}

# 4. 메타데이터 추가
.pipeline = "vector"
.environment = "local-perf-test"

# 5. Fingerprint (중복 제거용 ID 생성)
# SHA1 방식으로 동일한 로그 이벤트에 같은 ID 부여
id_source = join!([
  to_string(.timestamp_str) ?? "",
  to_string(.level) ?? "",
  to_string(.log_message) ?? ""
], separator: "|")
.generated_id = sha1(id_source)

# 불필요한 원본 필드 제거
del(.message)
del(.source_type)
'''

# 파싱 오류가 있어도 이벤트 드롭하지 않음
drop_on_error = false

# ============================================================
# Transform 2: 레벨별 라우팅 (ERROR는 별도 처리 가능)
# ============================================================
[transforms.route_by_level]
type = "route"
inputs = ["parse_logs"]

[transforms.route_by_level.route]
error = '.level == "ERROR" || .level == "FATAL"'
warn = '.level == "WARN"'
info = '.level == "INFO" || .level == "DEBUG" || .level == "TRACE"'

# ============================================================
# Sink 1: 콘솔 출력 (JSON 포맷, 디버그용)
# ============================================================
[sinks.console_output]
type = "console"
inputs = ["route_by_level.error", "route_by_level.warn"]
encoding.codec = "json"
# ERROR/WARN만 콘솔에 출력 (성능 측정에 영향 최소화)

# ============================================================
# Sink 2: HTTP Sink → Logstash 비교용
# Logstash와 동일한 데이터를 전송하여 처리량 비교
# ============================================================
[sinks.to_logstash_compare]
type = "http"
inputs = ["parse_logs"]
uri = "http://logstash:5044"
encoding.codec = "json"
# 배치 처리 설정
[sinks.to_logstash_compare.batch]
  max_bytes = 1049576    # 1MB
  max_events = 1000
  timeout_secs = 5
# 재시도 설정
[sinks.to_logstash_compare.request]
  concurrency = 4
  rate_limit_num = 1000
  rate_limit_duration_secs = 1
  retry_attempts = 3
  retry_initial_backoff_secs = 1
  retry_max_duration_secs = 30
  timeout_secs = 30

# ============================================================
# Sink 3: Elasticsearch 직접 색인 (벡터의 실제 성능 측정)
# ============================================================
[sinks.elasticsearch_direct]
type = "elasticsearch"
inputs = ["parse_logs"]
endpoints = ["http://elasticsearch:9200"]
# 인덱스명 날짜 기반 롤링
bulk.index = "logs-vector-%Y.%m.%d"
# document_id로 중복 방지 (Logstash fingerprint와 동일 방식)
id_key = "generated_id"
[sinks.elasticsearch_direct.batch]
  max_bytes = 10485760   # 10MB
  max_events = 5000
  timeout_secs = 10
