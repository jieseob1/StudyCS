# Logstash vs Vector 성능 비교 환경
# 동일한 로그 볼륨을 처리하면서 메모리/CPU 사용량을 비교합니다.
#
# 비교 목적:
#   - Logstash (JVM 기반): Java 애플리케이션, 상대적으로 높은 메모리 사용
#   - Vector (Rust 기반): 시스템 프로그래밍 언어, 낮은 메모리 풋프린트
#
# 실행: docker-compose up -d
# 측정: ./measure.sh

version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: perf-elasticsearch
    environment:
      - node.name=es01
      - cluster.name=perf-cluster
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - perf-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: perf-logstash
    # JVM 힙을 512m-1g으로 설정하여 프로덕션 유사 환경 재현
    environment:
      - LS_JAVA_OPTS=-Xms512m -Xmx1g
      - PIPELINE_WORKERS=2
      - PIPELINE_BATCH_SIZE=125
      - PIPELINE_BATCH_DELAY=50
    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ./sample-logs:/logs:ro
    networks:
      - perf-net
    depends_on:
      elasticsearch:
        condition: service_healthy
    # 메모리 제한: 측정값에 영향을 주지 않도록 충분한 여유 설정
    deploy:
      resources:
        limits:
          memory: 2g

  vector:
    image: timberio/vector:0.34.1-debian
    container_name: perf-vector
    volumes:
      - ./vector.toml:/etc/vector/vector.toml:ro
      - ./sample-logs:/logs:ro
    command: ["--config", "/etc/vector/vector.toml"]
    networks:
      - perf-net
    depends_on:
      elasticsearch:
        condition: service_healthy
    # Vector는 Rust 기반으로 훨씬 적은 메모리 사용
    deploy:
      resources:
        limits:
          memory: 256m

  # 로그 제너레이터: 테스트 중 지속적으로 로그를 생성
  log-generator:
    image: alpine:3.18
    container_name: perf-log-generator
    volumes:
      - ./sample-logs:/logs
    command: >
      sh -c "
        while true; do
          echo \"$$(date '+%Y-%m-%d %H:%M:%S.%3N') INFO  [com.superoffice.app.Service] Processing request id=$$(shuf -i 1000-9999 -n 1)\" >> /logs/app.log;
          sleep 0.01;
        done
      "
    networks:
      - perf-net

volumes:
  es-data:
    driver: local

networks:
  perf-net:
    driver: bridge
