# Logstash 파이프라인 설정
# Tmax 인수인계 문서 기반 프로덕션 설정 재현
#
# 처리 흐름:
#   1. /logs/*.log 파일 읽기 (멀티라인 Java 스택트레이스 포함)
#   2. Grok으로 파싱
#   3. Fingerprint로 중복 제거
#   4. 프로젝트별 조건부 처리 (superoffice, webtob 등)
#   5. ElasticSearch로 색인

input {
  file {
    path => "/logs/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => multiline {
      # Java 스택트레이스: 타임스탬프로 시작하지 않는 줄은 이전 이벤트에 합침
      pattern => "^\d{4}-\d{2}-\d{2}"
      negate => true
      what => "previous"
      # 10초 내 새 이벤트가 없으면 멀티라인 종료
      max_bytes => "10 MiB"
    }
    # 파일 변경 감지 주기
    stat_interval => "1 second"
    discover_interval => 5
    tags => ["file_input"]
  }
}

filter {
  # 1단계: Grok 파싱
  # Java 표준 로그 포맷: 2024-01-15 10:30:00.123 INFO  [com.example.Class] 메시지
  grok {
    match => {
      "message" => [
        # 전체 포맷: 타임스탬프 레벨 [로거] 메시지
        "%{TIMESTAMP_ISO8601:timestamp}\s+%{LOGLEVEL:level}\s+\[%{DATA:logger}\]\s+%{GREEDYDATA:log_message}",
        # 단순 포맷: 타임스탬프 레벨 메시지
        "%{TIMESTAMP_ISO8601:timestamp}\s+%{LOGLEVEL:level}\s+%{GREEDYDATA:log_message}",
        # 폴백: 메시지 전체를 log_message로
        "%{GREEDYDATA:log_message}"
      ]
    }
    tag_on_failure => ["_grokparsefailure"]
    # 파싱 실패 시에도 파이프라인 계속 진행
    overwrite => ["message"]
  }

  # 2단계: 타임스탬프 파싱
  if [timestamp] {
    date {
      match => ["timestamp", "yyyy-MM-dd HH:mm:ss.SSS", "yyyy-MM-dd HH:mm:ss", "ISO8601"]
      target => "@timestamp"
      tag_on_failure => ["_dateparsefailure"]
    }
  }

  # 3단계: 로그 레벨 정규화
  if [level] {
    mutate {
      uppercase => ["level"]
    }
  } else {
    mutate {
      add_field => { "level" => "INFO" }
    }
  }

  # 4단계: Fingerprint를 이용한 중복 제거
  # 동일한 로그가 여러 번 수집될 경우 ElasticSearch document_id로 dedup
  fingerprint {
    source => ["timestamp", "level", "log_message"]
    target => "generated_id"
    method => "SHA1"
    key => "logstash_dedup_key_2024"
    concatenate_sources => true
  }

  # 5단계: 프로젝트별 조건부 처리 (Tmax 인수인계 문서 기반)
  # 로그 경로 또는 내용으로 프로젝트 구분
  if [path] =~ /superoffice/ {
    mutate {
      add_field => {
        "project" => "superoffice"
        "project_type" => "groupware"
        "team" => "collaboration"
      }
    }
  } else if [path] =~ /webtob/ or [log_message] =~ /\[WebtoB\]/ {
    mutate {
      add_field => {
        "project" => "webtob"
        "project_type" => "webserver"
        "team" => "infrastructure"
      }
    }
    # WebtoB 특유의 접근 로그 추가 파싱
    grok {
      match => {
        "log_message" => "%{IP:client_ip}\s+-\s+-\s+\[%{HTTPDATE:access_time}\]\s+\"%{WORD:http_method}\s+%{URIPATHPARAM:request_uri}\s+HTTP/%{NUMBER:http_version}\"\s+%{NUMBER:status_code}\s+%{NUMBER:bytes_sent}"
      }
      tag_on_failure => []
    }
  } else if [path] =~ /jeus/ or [log_message] =~ /JEUS/ {
    mutate {
      add_field => {
        "project" => "jeus"
        "project_type" => "appserver"
        "team" => "infrastructure"
      }
    }
  } else {
    mutate {
      add_field => {
        "project" => "unknown"
        "project_type" => "general"
      }
    }
  }

  # 6단계: 스택트레이스 감지
  if [log_message] =~ /Exception|Error|at\s+\w+\.\w+/ {
    mutate {
      add_field => { "has_stacktrace" => "true" }
      add_tag => ["exception"]
    }
    # 예외 클래스 추출
    grok {
      match => {
        "log_message" => "(?<exception_class>[a-zA-Z][a-zA-Z0-9_.]*Exception|[a-zA-Z][a-zA-Z0-9_.]*Error)"
      }
      tag_on_failure => []
    }
  }

  # 7단계: 불필요한 필드 정리
  mutate {
    remove_field => ["timestamp", "host", "@version"]
    add_field => {
      "pipeline" => "logstash"
      "environment" => "local-perf-test"
    }
  }
}

output {
  # ElasticSearch로 색인 (document_id로 중복 방지)
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "logs-perf-%{+YYYY.MM.dd}"
    # Fingerprint로 생성한 ID를 document_id로 사용하여 멱등성 보장
    document_id => "%{generated_id}"
    # 벌크 처리 설정
    bulk_max_size => 500
    # 재시도 설정
    retry_max_interval => 64
    retry_initial_interval => 2
    # 연결 타임아웃
    request_timeout => 60
  }

  # 디버그용: 로컬 환경에서 stdout으로도 출력 (프로덕션에서는 비활성화)
  # stdout {
  #   codec => rubydebug
  # }
}
