# Redis 세션 관리 성능 테스트 환경
#
# 목적: Redis HSET/HGET/DEL 을 이용한 세션 관리 성능 측정
#   - 100 VUs x 100 iterations = 10,000 세션 처리
#   - p95 < 100ms 목표
#
# 실행:
#   docker-compose up -d
#   k6 run k6-session-test.js

version: '3.8'

services:
  redis:
    image: redis:7.2-alpine
    container_name: perf-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
        --loglevel notice
        --tcp-keepalive 60
        --timeout 0
        --tcp-backlog 511
        --databases 16
    volumes:
      - redis-data:/data
    networks:
      - redis-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 768m

  # Redis용 REST API 브리지 (k6는 HTTP로만 통신)
  # 세션 CRUD를 HTTP API로 노출하는 경량 Node.js 서버
  session-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: perf-session-api:latest
    container_name: perf-session-api
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=3000
      - NODE_ENV=production
    ports:
      - "3000:3000"
    networks:
      - redis-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m

volumes:
  redis-data:
    driver: local

networks:
  redis-net:
    driver: bridge
